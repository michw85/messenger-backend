spring.application.name=protomessenger

# Сервер
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/messenger?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=rootpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Redis
spring.redis.host=localhost
spring.redis.port=6379

# JWT
jwt.secret=yourSecretKeyAtLeast32CharactersLongPleaseChange
jwt.expiration=86400000

# WebSocket
spring.websocket.message-buffer-size=524288

# Логирование
logging.level.org.springframework.web.socket=DEBUG
logging.level.org.springframework.messaging=DEBUG

# CORS настройки
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

spring.security.user.name=admin
spring.security.user.password=admin